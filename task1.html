<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дом</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .house {
            position: relative;
            width: 300px;
            height: 200px;
        }

        .base {
            width: 100%;
            height: 200px;
            background-color: #fdefc2;
            position: relative;
        }

        .roof {
            width: 0;
            height: 0;
            border-left: calc(300px / 2) solid transparent;
            border-right: calc(300px / 2) solid transparent;
            border-bottom: 120px solid #5c3a21;
            position: absolute;
            top: -120px;
            left: 0;
            right: 0;
            margin: 0 auto;
        }

        .chimney {
            width: 40px;
            height: 60px;
            background-color: #1b0f06;
            position: absolute;
            top: 10px;
            left: 30px;
        }

        .door {
            width: 70px;
            height: 100px;
            background-color: #1b0f06;
            position: absolute;
            bottom: 0;
            left: 55px;
        }

        .window {
            width: 80px;
            height: 80px;
            background-color: #cde3ec;
            border-radius: 50%;
            position: absolute;
            top: calc((200px - 80px)/2);
            left: calc(55px + 70px + (300px - 55px - 70px - 80px)/2);
        }
    </style>
</head>

<body>
    <div class="house">
        <div class="roof">
            <div class="chimney"></div>
        </div>
        <div class="base">
            <div class="door"></div>
            <div class="window"></div>
        </div>
    </div>
</body>

</html>
